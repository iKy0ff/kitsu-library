name: Sync Kitsu Library

on:
  schedule:
    # Offset from :00/:15/:30/:45 to avoid global queue pile-ups
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kitsu-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # IMPORTANT: GitHub runners default to UTC. This controls what "local
      # time" means for every timestamp the aggregate sync writes, which
      # drives the dashboard's streaks, heatmap, and hour/day charts. Change
      # to your own IANA zone if you fork (e.g. "America/New_York").
      TZ: 'Europe/Paris'

    # ── Sync mode gate (repo variable SYNC_MODE) ───────────────────────
    #   manual → never runs on GitHub (run the scripts locally instead)
    #   github → only GitHub's schedule trigger runs it
    #   cron   → only an external workflow_dispatch call (cron-job.org) runs it
    #   both   → both triggers run it (default if unset)
    if: >-
      (github.event_name == 'schedule' && (vars.SYNC_MODE == '' || vars.SYNC_MODE == 'github' || vars.SYNC_MODE == 'both')) ||
      (github.event_name == 'workflow_dispatch' && vars.SYNC_MODE != 'manual')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # SYNC_SOURCE repo variable controls the Stats data source:
      #   repo (default) -> run sync.mjs and build this repo's own ledger
      #   ledger         -> skip sync.mjs; the Stats page auto-uses the
      #                     published Pace Ledger instead (no local ledger written)
      - name: Sync aggregate chapter count
        if: vars.SYNC_SOURCE != 'ledger'
        run: node scripts/sync.mjs
        continue-on-error: true
        id: sync_step

      - name: Sync per-title library
        run: node scripts/sync-library.mjs
        continue-on-error: true
        id: library_step

      # MAX_PER_RUN (repo variable, optional) caps how many titles are
      # (re)enriched per run. Unset -> the script's default (500 = whole
      # library in one go, ~45 min at ~1 req/s). Set it to 50-100 for the
      # first test runs, or 400-500 as a ceiling once the library is large.
      - name: Enrich from mangabaka
        run: node scripts/enrich.mjs
        env:
          MAX_PER_RUN: ${{ vars.MAX_PER_RUN }}
          REFRESH_HOURS: ${{ vars.REFRESH_HOURS }}
        continue-on-error: true
        id: enrich_step

      - name: Generate notifications (diff library changes)
        run: node scripts/notify.mjs
        continue-on-error: true
        id: notify_step

      - name: Service health check
        run: node scripts/healthcheck.mjs
        continue-on-error: true
        id: health_step

      - name: Commit and push if changed
        if: always()
        run: |
          git config user.name "kitsu-sync-bot"
          git config user.email "actions@users.noreply.github.com"

          # Stage files individually so missing ones don't trigger a fatal error
          git add manga_history_data.js 2>/dev/null || true
          git add manga_history_data.bak 2>/dev/null || true
          git add library.js 2>/dev/null || true
          git add notifications.js 2>/dev/null || true
          git add notify_state.json 2>/dev/null || true
          git add -A notifications/ 2>/dev/null || true
          git add -A entries/ 2>/dev/null || true
          git add sources_status.js 2>/dev/null || true
          git add -A daily_backup/ 2>/dev/null || true
          git add sync_errors.log 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "sync: update library, stats, notices, health [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

      - name: Fail the run if the aggregate sync failed
        if: steps.sync_step.outcome == 'failure'
        run: exit 1
